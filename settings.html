<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Vendora</title>

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header>
    <nav>
        <a href="index.html" class="logo">Vendora</a>
    </nav>
</header>

<main>
    <div class="auth-form">
        <h2>Account Settings</h2>

        <form id="settingsForm">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="newName" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="newPhone">
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                Save Changes
            </button>

        </form>
    </div>
</main>

<script src="supabase.js"></script>

<script>
let currentUser;

// ================= INIT =================
document.addEventListener('DOMContentLoaded', async () => {

    currentUser = await Vendora.getUser();

    if (!currentUser) {
        window.location.href = 'login.html';
        return;
    }

    loadProfile();
});

// ================= LOAD PROFILE =================
async function loadProfile() {

    const { data: profile } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('id', currentUser.id)
        .single();

    if (profile) {
        document.getElementById('newName').value = profile.full_name || '';
        document.getElementById('newPhone').value = profile.phone || '';
    }
}

// ================= SAVE =================
document.getElementById('settingsForm')
.addEventListener('submit', async (e) => {

    e.preventDefault();

    const full_name = document.getElementById('newName').value;
    const phone = document.getElementById('newPhone').value;

    const { error } = await supabaseClient
        .from('profiles')
        .upsert({
            id: currentUser.id,
            full_name,
            phone,
            email: currentUser.email
        });

    if (error) {
        alert(error.message);
    } else {
        alert('Profile updated successfully ✅');
        window.location.href = 'profile.html';
    }
});
</script>

</body>
</html>
