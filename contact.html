<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | Vendora</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <nav class="nav">
        <a href="index.html" class="logo">
            <span class="logo-icon">V</span> Vendora
        </a>
    </nav>
</header>

<main>

    <section class="support-hero">
        <h1>Need Help?</h1>
        <p>Our team is here for you 24/7 💬</p>
    </section>

    <!-- SUPPORT OPTIONS -->
    <section class="support-options">

        <div class="support-card">
            <h3>📧 Email Support</h3>
            <p>Send us a message and we'll reply quickly.</p>
            <a href="mailto:support@vendora.com" class="btn btn-secondary">
                support@vendora.com
            </a>
        </div>

        <div class="support-card whatsapp">
            <h3>💬 WhatsApp</h3>
            <p>Chat with us instantly on WhatsApp.</p>
            <a href="https://wa.me/2340000000000" target="_blank" class="btn btn-primary">
                Chat on WhatsApp
            </a>
        </div>

    </section>

    <!-- CONTACT FORM -->
    <section class="support-form">
        <div class="auth-form">
            <h2>Send a Message</h2>

            <form>
                <div class="form-group">
                    <label>Inquiry Type</label>
                    <select>
                        <option>Support</option>
                        <option>Partnership</option>
                        <option>Abuse Report</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Explain your issue..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Submit
                </button>
            </form>

        </div>
    </section>

</main>

</body>
</html>
